        :root {
            --bg-body: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --bg-active: #eff6ff;
            --border-color: #e2e8f0;
            --border-sidebar: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #dbeafe;
            --accent-glow: rgba(59, 130, 246, 0.12);
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --radius: 10px;
            --radius-sm: 6px;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 布局 */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-sidebar);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-sidebar);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sidebar-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-sidebar);
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }

        .sidebar-search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .sidebar-search input::placeholder { color: var(--text-muted); }

        .search-wrap {
            position: relative;
        }

        .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            margin: 2px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            border: none;
            background: none;
            width: calc(100% - 24px);
            text-align: left;
        }

        .nav-item:hover {
            background: var(--bg-main);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-active);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-icon {
            width: 22px;
            text-align: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .nav-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 2px 8px;
            border-radius: 100px;
            flex-shrink: 0;
        }

        .nav-item.active .nav-count {
            background: var(--accent-light);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-sidebar);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* 主内容区 */
        .main {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
        }

        .main-header {
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 32px;
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .main-title-icon {
            margin-right: 8px;
        }

        .main-stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .main-stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-content {
            padding: 24px 32px 60px;
            max-width: 1200px;
        }

        /* 链接卡片 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }

        .link-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .link-favicon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            flex-shrink: 0;
            margin-top: 2px;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .link-favicon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .link-favicon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }

        .link-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .link-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-arrow {
            color: var(--text-muted);
            opacity: 0;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 0.9rem;
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            color: var(--accent);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* 搜索结果 */
        .search-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: var(--sidebar-width);
            right: 0;
            bottom: 0;
            background: var(--bg-body);
            z-index: 90;
            overflow-y: auto;
        }

        .search-overlay.active { display: block; }

        .search-header {
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 32px;
            position: sticky;
            top: 0;
            z-index: 51;
        }

        .search-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .search-content {
            padding: 24px 32px;
            max-width: 1200px;
        }

        .search-highlight {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            padding: 0 3px;
            border-radius: 3px;
            font-weight: 600;
        }

        /* 子分类标签 */
        .sub-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .sub-tag {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .sub-tag.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeIn 0.35s ease forwards; }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .search-overlay { left: 0; }
        }
    </style>

        function getIcon(name) {
            return categoryIcons[name] || '📁';
        }

        // 统计
        function countItems(items) {
            let folders = 0, links = 0;
            for (const item of items) {
                if (item.type === 'folder') {
                    folders++;
                    const [f, l] = countItems(item.items);
                    folders += f;
                    links += l;
                } else {
                    links++;
                }
            }
            return [folders, links];
        }

        const [totalFolders, totalLinks] = countItems(bookmarkData);
        document.getElementById('folderCount').textContent = totalFolders;
        document.getElementById('linkCount').textContent = totalLinks;
        document.getElementById('footerStats').textContent = `共 ${totalFolders} 个分类 · ${totalLinks} 个书签`;

        // 计算单个分类的链接数
        function countLinks(items) {
            let count = 0;
            for (const item of items) {
                if (item.type === 'folder') {
                    count += countLinks(item.items);
                } else {
                    count++;
                }
            }
            return count;
        }

        // 渲染左侧导航
        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';

            // "全部"选项
            const allBtn = document.createElement('button');
            allBtn.className = 'nav-item active';
            allBtn.innerHTML = `<span class="nav-icon">📚</span><span class="nav-text">全部书签</span><span class="nav-count">${totalLinks}</span>`;
            allBtn.onclick = () => showAll();
            nav.appendChild(allBtn);

            // 各个分类
            for (const cat of bookmarkData) {
                if (cat.type !== 'folder') continue;
                const linkCount = countLinks(cat.items);
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.dataset.name = cat.name;
                btn.innerHTML = `<span class="nav-icon">${getIcon(cat.name)}</span><span class="nav-text">${escapeHtml(cat.name)}</span><span class="nav-count">${linkCount}</span>`;
                btn.onclick = () => showCategory(cat, btn);
                nav.appendChild(btn);
            }
        }

        // 显示全部
        function showAll() {
            activeCategory = null;
            activeSubCategory = null;
            setActiveNav(null);

            document.getElementById('mainTitle').innerHTML = '<span class="main-title-icon">📚</span>全部书签';

            // 显示所有分类的链接，按分类分组
            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            for (const cat of bookmarkData) {
                if (cat.type !== 'folder') continue;

                const section = document.createElement('div');
                section.style.marginBottom = '32px';

                const title = document.createElement('div');
                title.style.cssText = 'font-size:1.05rem;font-weight:600;color:var(--text-primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;cursor:pointer;';
                title.innerHTML = `<span>${getIcon(cat.name)}</span><span>${escapeHtml(cat.name)}</span><span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">(${countLinks(cat.items)})</span>`;
                title.onclick = () => {
                    const btn = document.querySelector(`[data-name="${escapeHtml(cat.name)}"]`);
                    if (btn) btn.click();
                };
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'links-grid animate-in';

                // 收集该分类下所有链接（包括子分类）
                const allLinks = collectLinks(cat.items);
                for (const link of allLinks.slice(0, 12)) {
                    grid.appendChild(createLinkCard(link));
                }

                if (allLinks.length > 12) {
                    const more = document.createElement('div');
                    more.style.cssText = 'grid-column:1/-1;text-align:center;padding:8px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;';
                    more.innerHTML = `+ 还有 ${allLinks.length - 12} 个书签，点击查看全部 →`;
                    more.onclick = () => {
                        const btn = document.querySelector(`[data-name="${escapeHtml(cat.name)}"]`);
                        if (btn) btn.click();
                    };
                    grid.appendChild(more);
                }

                section.appendChild(grid);
                container.appendChild(section);
            }

            hideSearch();
        }

        // 显示单个分类
        function showCategory(cat, btnElement) {
            activeCategory = cat;
            activeSubCategory = null;
            setActiveNav(btnElement);

            document.getElementById('mainTitle').innerHTML = `<span class="main-title-icon">${getIcon(cat.name)}</span>${escapeHtml(cat.name)}`;

            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            // 检查是否有子分类
            const subFolders = cat.items.filter(i => i.type === 'folder');
            const directLinks = cat.items.filter(i => i.type === 'link');

            // 子分类标签
            if (subFolders.length > 0) {
                const tagsWrap = document.createElement('div');
                tagsWrap.className = 'sub-tags animate-in';

                const allTag = document.createElement('span');
                allTag.className = 'sub-tag active';
                allTag.textContent = '全部';
                allTag.onclick = () => showSubCategory(null, subFolders, directLinks, allTag);
                tagsWrap.appendChild(allTag);

                for (const sub of subFolders) {
                    const tag = document.createElement('span');
                    tag.className = 'sub-tag';
                    tag.textContent = sub.name;
                    tag.onclick = () => showSubCategory(sub, subFolders, directLinks, tag);
                    tagsWrap.appendChild(tag);
                }

                container.appendChild(tagsWrap);
            }

            // 显示链接
            const grid = document.createElement('div');
            grid.className = 'links-grid animate-in';
            grid.id = 'categoryGrid';

            // 默认显示全部
            const allLinks = collectLinks(cat.items);
            for (const link of allLinks) {
                grid.appendChild(createLinkCard(link));
            }

            container.appendChild(grid);
            hideSearch();
        }

        // 显示子分类
        function showSubCategory(sub, allSubs, directLinks, tagElement) {
            activeSubCategory = sub;

            // 更新标签状态
            const tags = tagElement.parentElement.querySelectorAll('.sub-tag');
            tags.forEach(t => t.classList.remove('active'));
            tagElement.classList.add('active');

            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';

            let links = [];
            if (sub) {
                links = collectLinks(sub.items);
            } else {
                links = collectLinks([...directLinks, ...allSubs]);
            }

            for (const link of links) {
                grid.appendChild(createLinkCard(link));
            }
        }

        // 收集所有链接（递归）
        function collectLinks(items) {
            const links = [];
            for (const item of items) {
                if (item.type === 'folder') {
                    links.push(...collectLinks(item.items));
                } else {
                    links.push(item);
                }
            }
            return links;
        }

        // 创建链接卡片
        function createLinkCard(link) {
            const card = document.createElement('a');
            card.className = 'link-card';
            card.href = link.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';

            const domain = getDomain(link.url);
            card.innerHTML = `
                <div class="link-favicon">
                    <img src="https://favicon.im/${domain}" alt="" onerror="this.style.display='none';this.parentElement.textContent='🔗'">
                </div>
                <div class="link-info">
                    <div class="link-title">${escapeHtml(link.title)}</div>
                    <div class="link-url">${domain}</div>
                </div>
                <div class="link-arrow">→</div>
            `;
            return card;
        }

        // 设置导航激活状态
        function setActiveNav(activeBtn) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            if (activeBtn) activeBtn.classList.add('active');
            else items[0].classList.add('active');
        }

        // 搜索
        function handleSearch(query) {
            if (!query.trim()) {
                hideSearch();
                if (activeCategory) {
                    const btn = document.querySelector(`[data-name="${activeCategory.name}"]`);
                    if (btn) showCategory(activeCategory, btn);
                    else showAll();
                } else {
                    showAll();
                }
                return;
            }

            const results = searchItems(bookmarkData, query.toLowerCase());
            showSearchResults(results, query);
        }

        function searchItems(items, query) {
            const results = [];
            for (const item of items) {
                if (item.type === 'folder') {
                    results.push(...searchItems(item.items, query));
                } else if (item.type === 'link') {
                    if (item.title.toLowerCase().includes(query) || item.url.toLowerCase().includes(query)) {
                        results.push(item);
                    }
                }
            }
            return results;
        }

        function showSearchResults(results, query) {
            document.getElementById('mainContent').style.display = 'none';
            document.querySelector('.main-header').style.display = 'none';
            const overlay = document.getElementById('searchOverlay');
            overlay.classList.add('active');

            const grid = document.getElementById('searchGrid');

            if (results.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <p>未找到包含 "${escapeHtml(query)}" 的书签</p>
                    </div>
                `;
                return;
            }

            document.querySelector('.search-title').innerHTML = `🔍 搜索结果 <span style="color:var(--text-muted);font-size:0.9rem;font-weight:400;">找到 ${results.length} 个书签</span>`;

            grid.innerHTML = '';
            for (const link of results) {
                const card = createLinkCard(link);
                // 高亮标题
                const titleEl = card.querySelector('.link-title');
                titleEl.innerHTML = highlightText(link.title, query);
                grid.appendChild(card);
            }
        }

        function hideSearch() {
            document.getElementById('mainContent').style.display = 'block';
            document.querySelector('.main-header').style.display = 'flex';
            document.getElementById('searchOverlay').classList.remove('active');
        }

        function highlightText(text, query) {
            const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
            return escapeHtml(text).replace(regex, '<span class="search-highlight">$1</span>');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getDomain(url) {
            try {
                return new URL(url).hostname;
            } catch {
                return url;
            }
        }

        // 初始化
        renderSidebar();
        showAll();
    </script>
</body>
</html>
